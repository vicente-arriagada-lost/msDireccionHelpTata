spring.application.name=Direccion
server.port=8084

# ============================================================
# Base de datos H2 en memoria (solo para desarrollo/pruebas)
# ============================================================
spring.datasource.url=jdbc:h2:mem:direcciondb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Consola web de H2 accesible en http://localhost:8084/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Kafka desactivado en desarrollo (requiere un broker externo para funcionar)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# ============================================================
# URLs de otros microservicios (para comunicacion REST)
# ============================================================
